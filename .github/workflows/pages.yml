name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # `storydeck` is a public github: dependency (ships source) — npm install resolves it directly,
      # so no sibling checkout is needed. `npm install` (not `npm ci`) works with or without a lockfile.
      - name: Install dependencies
        run: npm install

      - name: Build static export (next build → out/)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
